services:
  postgres:
    image: postgres:15-alpine
    container_name: macedo_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-macedo_system}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - macedo_network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: macedo_redis_prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    networks:
      - macedo_network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: macedo_backend_prod
    ports:
      - "3000:3000"
    environment:
      FRONTEND_URL: http://212.85.14.87
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-macedo_system}
      JWT_SECRET: ${JWT_SECRET:-supersecretkeyCHANGE}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecretrefreshCHANGE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-jJyGy6myLktYQ0lKw71m/+PTWEx7hQL+HJ4cPa1eIr4=}
      PORT: 3000
    depends_on:
      - postgres
      - redis
    volumes:
      - secure_data_prod:/app/secure
    networks:
      - macedo_network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: macedo_frontend_prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - macedo_network
    restart: always

networks:
  macedo_network:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:
  secure_data_prod:
