<ion-header>
    <ion-toolbar class="top-toolbar ion-hide-md-down">
        <div class="header-content">
            <div class="left-actions">
                <ion-buttons slot="start" style="display:inline-block; vertical-align: middle;">
                    <ion-menu-button color="primary"></ion-menu-button>
                </ion-buttons>
                <div style="display: inline-block; vertical-align: middle; margin-left: 8px;">
                    <h1 style="margin: 0; font-size: 1.1rem; font-weight: 600;">Categorias</h1>
                    <p style="margin: 0; font-size: 0.8rem; color: #666;">Gestão de Categorias</p>
                </div>
            </div>

            <div class="right-actions">
                <ion-button fill="outline" size="small" color="medium" class="action-btn" (click)="openImportModal()">
                    <ion-icon name="cloud-upload-outline" slot="start"></ion-icon> Importar
                </ion-button>
                <ion-button fill="outline" size="small" color="medium" class="action-btn" (click)="exportCSV()">
                    <ion-icon name="download-outline" slot="start"></ion-icon> Exportar
                </ion-button>
                <ion-button color="primary" class="add-btn" routerLink="/financial/categories/new">
                    <ion-icon name="add" slot="start"></ion-icon>
                    Nova Categoria
                </ion-button>
            </div>
        </div>
    </ion-toolbar>

    <ion-toolbar class="filter-toolbar">
        <div class="filter-row">
            <div class="search-box" style="flex: 1">
                <div class="label-text">Pesquisar</div>
                <div class="input-wrapper">
                    <input type="text" placeholder="Buscar categorias..." class="clean-search" (input)="filterCategories($event)" />
                    <ion-icon name="search-outline"></ion-icon>
                </div>
            </div>
        </div>
    </ion-toolbar>
</ion-header>

<ion-content class="light-bg">

  <ion-refresher slot="fixed" (ionRefresh)="loadCategories($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="list-container">
    <ion-card *ngFor="let category of filteredCategories" [routerLink]="['/financial/categories', category.id]"
      class="standard-card" button>
      <div class="card-content-wrapper">
        <div class="icon-box" [class.revenue]="category.tipo === 'RECEITA'"
          [class.expense]="category.tipo === 'DESPESA'">
          <ion-icon
            [name]="category.tipo === 'RECEITA' ? 'arrow-down-circle-outline' : 'arrow-up-circle-outline'"></ion-icon>
        </div>
        <div class="info-content">
          <h3>{{ category.nome }}</h3>
          <div class="meta-row">
            <span class="type-badge" [class.revenue]="category.tipo === 'RECEITA'"
              [class.expense]="category.tipo === 'DESPESA'">
              {{ category.tipo === 'RECEITA' ? 'Receita' : 'Despesa' }}
            </span>
            <span class="dot">•</span>
            <span class="count">{{ category.subcategorias?.length || 0 }} subcategorias</span>
          </div>
        </div>
        <div class="arrow-action">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </div>
      </div>
    </ion-card>

    <div *ngIf="filteredCategories.length === 0" class="empty-state">
      <ion-icon name="pricetags-outline"></ion-icon>
      <p>Nenhuma categoria encontrada.</p>
    </div>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/financial/categories/new" color="primary" class="custom-fab">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
