<ion-header class="ion-no-border">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-back-button defaultHref="/financial/cost-centers" color="primary" icon="arrow-back-outline"
                text=""></ion-back-button>
        </ion-buttons>
        <ion-title color="primary">{{ isNew ? 'Novo Centro de Custo' : 'Editar Centro de Custo' }}</ion-title>
        <ion-buttons slot="end">
            <ion-button *ngIf="!isNew" (click)="delete()" color="danger">
                <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
    <div class="form-wrapper">
        <div class="section-header">
            <h2>Informações do Centro de Custo</h2>
            <p>Defina o código e nome para organização financeira.</p>
        </div>

        <ion-card class="form-card">
            <ion-card-content>
                <form (ngSubmit)="save()">
                    <ion-grid>
                        <ion-row>
                            <ion-col size="12" size-md="4">
                                <div class="input-group">
                                    <ion-label position="stacked">Código</ion-label>
                                    <ion-input [(ngModel)]="costCenter.codigo" name="codigo" type="text"
                                        placeholder="Ex: 001" required></ion-input>
                                </div>
                            </ion-col>

                            <ion-col size="12" size-md="8">
                                <div class="input-group">
                                    <ion-label position="stacked">Nome</ion-label>
                                    <ion-input [(ngModel)]="costCenter.nome" name="nome" type="text"
                                        placeholder="Ex: Departamento de TI" required></ion-input>
                                </div>
                            </ion-col>

                            <ion-col size="12">
                                <div class="input-group">
                                    <ion-label position="stacked">Descrição (Opcional)</ion-label>
                                    <ion-textarea [(ngModel)]="costCenter.descricao" name="descricao" rows="4"
                                        placeholder="Detalhes adicionais..."></ion-textarea>
                                </div>
                            </ion-col>
                        </ion-row>

                        <ion-row class="ion-margin-top">
                            <ion-col size="12">
                                <ion-button expand="block" type="submit" class="save-btn" [disabled]="!costCenter.nome">
                                    <ion-icon name="save-outline" slot="start"></ion-icon>
                                    Salvar
                                </ion-button>
                            </ion-col>
                        </ion-row>
                    </ion-grid>
                </form>
            </ion-card-content>
        </ion-card>
    </div>
</ion-content>
