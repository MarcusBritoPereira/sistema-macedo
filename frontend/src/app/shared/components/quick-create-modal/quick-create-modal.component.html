<ion-header>
    <ion-toolbar>
        <ion-title>{{ title }}</ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="dismiss()">Cancelar</ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
    <form (ngSubmit)="save()">

        <!-- NAME (All Entities) -->
        <ion-item class="input-item">
            <ion-label position="stacked">Nome <ion-text color="danger">*</ion-text></ion-label>
            <ion-input [(ngModel)]="form.nome" name="nome" type="text" placeholder="Digite o nome" required></ion-input>
        </ion-item>

        <!-- TYPE (Category Only) -->
        <ion-item class="input-item" *ngIf="entityType === 'CATEGORY'">
            <ion-label position="stacked">Tipo</ion-label>
            <ion-select [(ngModel)]="form.tipo" name="tipo" disabled="true">
                <ion-select-option value="RECEITA">Receita</ion-select-option>
                <ion-select-option value="DESPESA">Despesa</ion-select-option>
            </ion-select>
        </ion-item>

        <ion-item class="input-item" *ngIf="entityType === 'CATEGORY'">
            <ion-label position="stacked">Classificação DRE</ion-label>
            <ion-select [(ngModel)]="form.classificacaoDRE" name="classificacaoDRE" placeholder="Selecione">
                <ion-select-option value="VENDAS">Vendas</ion-select-option>
                <ion-select-option value="CUSTO_VARIAVEL">Custo Variável</ion-select-option>
                <ion-select-option value="DESPESA_FIXA">Despesa Fixa</ion-select-option>
                <ion-select-option value="INVESTIMENTO">Investimento</ion-select-option>
                <ion-select-option value="NAO_OPERACIONAL">Não Operacional</ion-select-option>
            </ion-select>
        </ion-item>

        <!-- CPF/CNPJ (Supplier/Client Only) -->
        <ion-item class="input-item" *ngIf="entityType === 'SUPPLIER' || entityType === 'CLIENT'">
            <ion-label position="stacked">CPF/CNPJ (Opcional)</ion-label>
            <ion-input [(ngModel)]="form.cpfCnpj" name="cpfCnpj" type="text" placeholder="000.000.000-00"></ion-input>
        </ion-item>

        <!-- DESCRIPTION (Category/Cost Center) -->
        <ion-item class="input-item" *ngIf="entityType === 'CATEGORY' || entityType === 'COST_CENTER'">
            <ion-label position="stacked">Descrição (Opcional)</ion-label>
            <ion-input [(ngModel)]="form.descricao" name="descricao" type="text"></ion-input>
        </ion-item>

        <div class="ion-padding-top ion-margin-top">
            <ion-button expand="block" type="submit" [disabled]="!form.nome || isLoading">
                <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
                <span *ngIf="!isLoading">Salvar</span>
            </ion-button>
        </div>

    </form>
</ion-content>
