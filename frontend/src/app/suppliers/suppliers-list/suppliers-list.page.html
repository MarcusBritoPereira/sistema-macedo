<ion-header>
    <ion-toolbar class="top-toolbar">
        <div class="header-content">
            <div class="left-actions">
                <ion-menu-button></ion-menu-button>
                <div class="page-title">
                    <h1>Fornecedores</h1>
                    <p>Gestão de Parceiros e Serviços</p>
                </div>
            </div>

            <div class="right-actions">
                <ion-button fill="outline" class="action-btn" disabled>
                    <ion-icon name="download-outline" slot="start"></ion-icon>
                    Exportar
                </ion-button>
                <ion-button color="primary" class="add-btn" routerLink="/suppliers/new">
                    <ion-icon name="add" slot="start"></ion-icon>
                    Novo Fornecedor
                </ion-button>
            </div>
        </div>
    </ion-toolbar>

    <ion-toolbar class="filter-toolbar">
        <div class="filter-row">
            <div class="search-box">
                <div class="label-text">Pesquisar</div>
                <div class="input-wrapper">
                    <input type="text" placeholder="Nome, CNPJ ou Email" class="clean-search" [(ngModel)]="searchTerm"
                        (input)="filterSuppliers()">
                    <ion-icon name="search-outline"></ion-icon>
                </div>
            </div>
        </div>
    </ion-toolbar>
</ion-header>

<ion-content class="light-bg">
    <div class="data-table-container">
        <div class="table-header">
            <div class="col-name">Fornecedor</div>
            <div class="col-doc">CNPJ</div>
            <div class="col-contact">Contato</div>
            <div class="col-actions"></div>
        </div>

        <div class="table-body">
            <div class="table-row" *ngFor="let supplier of filteredSuppliers"
                [routerLink]="['/suppliers', supplier.id]">
                <div class="col-name">
                    {{ supplier.nomeFantasia }}
                    <span class="secondary-text" *ngIf="supplier.razaoSocial">{{ supplier.razaoSocial }}</span>
                </div>

                <div class="col-doc">
                    {{ supplier.cnpj || '-' }}
                </div>

                <div class="col-contact">
                    <div>{{ supplier.email || '-' }}</div>
                    <span class="secondary-text">{{ supplier.telefone || '' }}</span>
                </div>

                <div class="col-actions">
                    <ion-button fill="clear" size="small">
                        <ion-icon name="chevron-forward-outline" slot="icon-only"></ion-icon>
                    </ion-button>
                </div>
            </div>

            <div class="empty-state" *ngIf="filteredSuppliers.length === 0">
                <p>Nenhum fornecedor encontrado para sua busca.</p>
            </div>
        </div>
    </div>
</ion-content>
