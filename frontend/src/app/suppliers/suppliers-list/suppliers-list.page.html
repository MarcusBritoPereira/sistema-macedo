<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title>Fornecedores</ion-title>
        <ion-buttons slot="end">
            <ion-button routerLink="/suppliers/new">
                <ion-icon slot="start" name="add-outline"></ion-icon>
                Novo
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
    <ion-toolbar>
        <ion-searchbar [(ngModel)]="searchTerm" (ionInput)="filterSuppliers()"
            placeholder="Buscar fornecedor..."></ion-searchbar>
    </ion-toolbar>
</ion-header>

<ion-content>
    <ion-list>
        <ion-item *ngFor="let supplier of filteredSuppliers" [routerLink]="['/suppliers', supplier.id]" button detail>
            <ion-label>
                <h2>{{ supplier.nomeFantasia }}</h2>
                <p>{{ supplier.cnpj || 'Sem CNPJ' }} - {{ supplier.email || 'Sem email' }}</p>
            </ion-label>
        </ion-item>

        <ion-item *ngIf="filteredSuppliers.length === 0">
            <ion-label class="ion-text-center">Nenhum fornecedor encontrado.</ion-label>
        </ion-item>
    </ion-list>
</ion-content>
